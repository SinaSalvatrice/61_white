name: Build QMK firmware

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  KEYBOARD: 61_white
  KEYMAP: default
  USERSPACE: users/${{ github.actor }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          submodules: recursive

      - name: Checkout userspace
        uses: actions/checkout@v4
        with:
          path: repo-src

      - name: Stage custom keyboard in userspace
        run: |
          mkdir -p "${USERSPACE}/keyboards/${KEYBOARD}/keymaps/${KEYMAP}"
          cp repo-src/config.h repo-src/keyboard.json repo-src/rules.mk repo-src/source.c "${USERSPACE}/keyboards/${KEYBOARD}/"
          cp repo-src/keymaps/default/keymap.c "${USERSPACE}/keyboards/${KEYBOARD}/keymaps/${KEYMAP}/"

      - name: Build firmware
        env:
          QMK_USERSPACE: ${{ env.USERSPACE }}
        run: qmk compile -kb "${KEYBOARD}" -km "${KEYMAP}"

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KEYBOARD }}-${{ env.KEYMAP }}-${{ github.run_number }}
          path: |
            .build/*.hex
            .build/*.bin
            .build/*.uf2
            *.hex
            *.bin
            *.uf2
          if-no-files-found: error