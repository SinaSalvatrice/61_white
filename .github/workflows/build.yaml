name: Build firmware

on:
  workflow_dispatch:
    inputs:
      keyboard:
        description: "QMK keyboard path, e.g. handwired/61_white"
        required: true
        default: "handwired/61_white"
      keymap:
        description: "Keymap name"
        required: true
        default: "default"
  push:
    branches:
      - main
      - master
    paths:
      - 'keyboards/**'
      - '.github/workflows/build.yml'
  pull_request:

env:
  KEYBOARD: handwired/61_white
  KEYMAP: default

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve inputs
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.keyboard }}" ]; then
            echo "KEYBOARD=${{ github.event.inputs.keyboard }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ github.event.inputs.keymap }}" ]; then
            echo "KEYMAP=${{ github.event.inputs.keymap }}" >> $GITHUB_ENV
          fi
          echo "Using KEYBOARD=$KEYBOARD"
          echo "Using KEYMAP=$KEYMAP"

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            unzip \
            zip \
            tar \
            gzip \
            xz-utils \
            dfu-programmer \
            dfu-util \
            gcc-avr \
            binutils-avr \
            avr-libc \
            arm-none-eabi-gcc \
            arm-none-eabi-binutils \
            arm-none-eabi-newlib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install QMK CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: Set up QMK
        shell: bash
        run: |
          qmk setup -y -H "$HOME/qmk_firmware"
          rsync -av --delete keyboards/ "$HOME/qmk_firmware/keyboards/" || true
          echo "Repo keyboard files copied into QMK tree"

      - name: Show copied keyboard folders
        shell: bash
        run: |
          echo "Searching for keyboard path hints..."
          find "$HOME/qmk_firmware/keyboards" -maxdepth 4 -type d | sort | sed -n '1,300p'

      - name: Compile firmware
        shell: bash
        run: |
          cd "$HOME/qmk_firmware"
          qmk compile -kb "$KEYBOARD" -km "$KEYMAP"

      - name: Collect build artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cd "$HOME/qmk_firmware"

          echo "Listing .build contents:"
          find .build -maxdepth 3 -type f | sort || true

          find .build -type f \( -name "*.uf2" -o -name "*.hex" -o -name "*.bin" -o -name "*.elf" \) -exec cp {} "$GITHUB_WORKSPACE/artifacts/" \;

          echo "Collected artifacts:"
          ls -la "$GITHUB_WORKSPACE/artifacts"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware_${{ env.KEYBOARD }}_${{ env.KEYMAP }}
          path: artifacts/*
          if-no-files-found: error