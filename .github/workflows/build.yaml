name: Build QMK firmware

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

env:
  KEYBOARD: 61_white
  KEYMAP: default
  KEYBOARD_PATH: keyboards/61_white

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          submodules: recursive

      - name: Checkout userspace
        uses: actions/checkout@v4
        with:
          path: repo-src

      - name: Stage custom keyboard
        run: |
          mkdir -p "${KEYBOARD_PATH}/keymaps/${KEYMAP}"
          cp repo-src/config.h repo-src/info.json repo-src/keyboard.c repo-src/keyboard.h repo-src/rules.mk repo-src/source.c "${KEYBOARD_PATH}/"
          cp repo-src/keymaps/default/keymap.c "${KEYBOARD_PATH}/keymaps/${KEYMAP}/"

      - name: Build firmware
        run: make "${KEYBOARD}:${KEYMAP}"

      - name: Collect firmware artifacts
        run: |
          mkdir -p artifacts
          find . -type f \( -name '*.hex' -o -name '*.bin' -o -name '*.uf2' \) \
            ! -path './repo-src/*' \
            ! -path './.git/*' \
            -print \
            -exec cp -f {} artifacts/ \;
          test -n "$(find artifacts -maxdepth 1 -type f -print -quit)"

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KEYBOARD }}-${{ env.KEYMAP }}-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error